name: Build and Release

on:
  push:
    tags: ['v*']
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  # ---- Windows 桌面 app ----
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Desktop App
        run: |
          cd desktop
          npm install
          npx tauri build --bundler nsis
      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: CSSwitch-Windows-x64
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ---- Linux Helper ----
  build-helper:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - name: Build Helper
        run: |
          cd desktop/src-tauri
          cargo build --bin csswitch-helper --no-default-features --release --target ${{ matrix.target }}
      - name: Upload Helper
        uses: actions/upload-artifact@v4
        with:
          name: csswitch-helper-${{ matrix.target }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/csswitch-helper

  # ---- Tests ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cd desktop/src-tauri && cargo test --lib
      - name: Run Helper Tests
        run: cd desktop/src-tauri && cargo test --bin csswitch-helper --no-default-features

  # ---- GitHub Release (tag push only) ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-helper, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CSSwitch-Windows-x64/*.exe
            csswitch-helper-*/*
          draft: false
          generate_release_notes: true
