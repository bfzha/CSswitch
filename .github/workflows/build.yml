name: Build and Release

on:
  push:
    tags: ['v*']
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  # ---- Windows 桌面 app ----
  build-windows:
    needs: build-helper
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux Helper Assets
        uses: actions/download-artifact@v4
        with:
          pattern: csswitch-helper-linux-*
          path: desktop/src-tauri/helper-assets
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Desktop App
        run: |
          cd desktop
          npm install
          npx tauri build --bundler nsis
      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: CSSwitch-Windows-x64
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ---- macOS 桌面 app ----
  build-macos:
    needs: build-helper
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact: CSSwitch-macOS-x64
          - runner: macos-15
            target: aarch64-apple-darwin
            artifact: CSSwitch-macOS-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux Helper Assets
        uses: actions/download-artifact@v4
        with:
          pattern: csswitch-helper-linux-*
          path: desktop/src-tauri/helper-assets
          merge-multiple: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Desktop App
        run: |
          cd desktop
          npm install
          npx tauri build --target ${{ matrix.target }} --bundler dmg
      - name: Upload DMG Installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # ---- Linux Helper ----
  build-helper:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_arch: x86_64
          - target: aarch64-unknown-linux-musl
            asset_arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - name: Build Helper
        run: |
          cd desktop/src-tauri
          cargo build --bin csswitch-helper --no-default-features --release --target ${{ matrix.target }}
          mkdir -p helper-out
          cp target/${{ matrix.target }}/release/csswitch-helper helper-out/csswitch-helper-linux-${{ matrix.asset_arch }}
      - name: Upload Helper
        uses: actions/upload-artifact@v4
        with:
          name: csswitch-helper-linux-${{ matrix.asset_arch }}
          path: desktop/src-tauri/helper-out/csswitch-helper-linux-${{ matrix.asset_arch }}

  # ---- Tests ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cd desktop/src-tauri && cargo test --lib
      - name: Run Helper Tests
        run: cd desktop/src-tauri && cargo test --bin csswitch-helper --no-default-features

  # ---- GitHub Release (tag push only) ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-helper, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CSSwitch-Windows-x64/*.exe
            CSSwitch-macOS-*/*.dmg
            csswitch-helper-*/*
          draft: false
          generate_release_notes: true
